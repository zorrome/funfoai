# EC2 环境覆盖：覆盖本地 Mac 路径与 Docker socket，便于在 EC2 上一键更新并重启
# 使用: docker compose -f docker-compose.yml -f docker-compose.ec2.yml up -d --build
# HOST_PROJECT_ROOT 由 scripts/update-and-restart.sh 传入（或 .env），需为宿主机上项目根目录的绝对路径

services:
  funfo-ai-store:
    volumes:
      - ./server:/app/server
      # 将宿主机项目根挂载到相同绝对路径，这样容器内写入 HOST_PROJECT_ROOT 下的 server/apps 会直接落到宿主机
      - ${HOST_PROJECT_ROOT:-/opt/funfoai}:${HOST_PROJECT_ROOT:-/opt/funfoai}
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HOST_PROJECT_ROOT=${HOST_PROJECT_ROOT:-/opt/funfoai}
      - DOCKER_HOST=unix:///var/run/docker.sock
      # OpenClaw 若在本机 18789 端口，从容器内用 host.docker.internal 访问（Linux 需 Docker 20.10+）
      - OPENCLAW_URL=${OPENCLAW_URL:-http://host.docker.internal:18789/v1/chat/completions}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN:-}
      # 外网访问时 HMR WebSocket 用公网 host（.env 中设 VITE_HMR_HOST=你的 EC2 公网主机名或域名）
      - VITE_HMR_HOST=${VITE_HMR_HOST:-}
      # 预览/分享链接使用公网 base（与 Nginx 访问一致，如 http://ec2-xxx.compute.amazonaws.com）
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - funfo_net

networks:
  funfo_net:
    name: funfo_ai_store_default
