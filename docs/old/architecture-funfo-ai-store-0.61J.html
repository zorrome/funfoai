<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>funfo AI Store 0.61J - 架构图</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background:#f6f8fb; color:#0f172a; }
    .wrap { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:16px; margin-bottom:16px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    .muted { color:#475569; font-size: 14px; }
    svg { width:100%; height:auto; border:1px solid #e2e8f0; border-radius:12px; background:#fff; }
    .legend { display:grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap:8px; font-size:13px; color:#334155; }
    .dot { display:inline-block; width:10px; height:10px; border-radius:999px; margin-right:6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>funfo AI Store 0.61J 架构图</h1>
      <div class="muted">版本：funfo AI Store 0.61J ｜ 重点：Docker 主服务 + 每子App独立容器 + /app/&lt;slug&gt; 路由</div>
    </div>

    <svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L10,3 L0,6 z" fill="#64748b" />
        </marker>
      </defs>

      <rect x="24" y="24" width="1152" height="712" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>

      <rect x="60" y="70" width="240" height="90" rx="10" fill="#e0f2fe" stroke="#38bdf8"/>
      <text x="180" y="103" text-anchor="middle" font-size="16" font-weight="600">用户浏览器</text>
      <text x="180" y="128" text-anchor="middle" font-size="13" fill="#334155">Web UI / 聊天流 / 预览 iframe</text>

      <rect x="360" y="50" width="500" height="240" rx="12" fill="#ecfeff" stroke="#22d3ee"/>
      <text x="610" y="78" text-anchor="middle" font-size="17" font-weight="700">funfo-ai-store 主容器（Docker）</text>

      <rect x="390" y="96" width="210" height="76" rx="8" fill="#ffffff" stroke="#94a3b8"/>
      <text x="495" y="124" text-anchor="middle" font-size="14" font-weight="600">Frontend (Vite)</text>
      <text x="495" y="146" text-anchor="middle" font-size="12" fill="#475569">:5175</text>

      <rect x="620" y="96" width="210" height="76" rx="8" fill="#ffffff" stroke="#94a3b8"/>
      <text x="725" y="124" text-anchor="middle" font-size="14" font-weight="600">Backend (Express)</text>
      <text x="725" y="146" text-anchor="middle" font-size="12" fill="#475569">:3100 / API / QA Gate</text>

      <rect x="390" y="188" width="440" height="76" rx="8" fill="#ffffff" stroke="#94a3b8"/>
      <text x="610" y="216" text-anchor="middle" font-size="14" font-weight="600">核心能力</text>
      <text x="610" y="238" text-anchor="middle" font-size="12" fill="#475569">PM/UI 两阶段 AI 调用 · 代码生成 · QA 检查 · 部署控制</text>

      <rect x="910" y="50" width="230" height="120" rx="10" fill="#fff7ed" stroke="#fb923c"/>
      <text x="1025" y="79" text-anchor="middle" font-size="15" font-weight="600">OpenClaw API</text>
      <text x="1025" y="102" text-anchor="middle" font-size="12" fill="#475569">产品经理策划 / UI设计 / 代码生成</text>
      <text x="1025" y="123" text-anchor="middle" font-size="12" fill="#475569">自动重试 + 超时控制</text>

      <rect x="360" y="330" width="780" height="180" rx="12" fill="#f0fdf4" stroke="#4ade80"/>
      <text x="750" y="358" text-anchor="middle" font-size="17" font-weight="700">子App运行层（每个App一个容器）</text>

      <rect x="390" y="378" width="220" height="100" rx="8" fill="#fff" stroke="#94a3b8"/>
      <text x="500" y="406" text-anchor="middle" font-size="14" font-weight="600">funfo-app-81</text>
      <text x="500" y="428" text-anchor="middle" font-size="12" fill="#475569">Express + better-sqlite3</text>
      <text x="500" y="448" text-anchor="middle" font-size="12" fill="#475569">label: app_id, slug</text>

      <rect x="640" y="378" width="220" height="100" rx="8" fill="#fff" stroke="#94a3b8"/>
      <text x="750" y="406" text-anchor="middle" font-size="14" font-weight="600">funfo-app-84</text>
      <text x="750" y="428" text-anchor="middle" font-size="12" fill="#475569">独立运行、独立数据</text>
      <text x="750" y="448" text-anchor="middle" font-size="12" fill="#475569">/app/&lt;slug&gt;/api/* 代理</text>

      <rect x="890" y="378" width="220" height="100" rx="8" fill="#fff" stroke="#94a3b8"/>
      <text x="1000" y="406" text-anchor="middle" font-size="14" font-weight="600">funfo-app-N</text>
      <text x="1000" y="428" text-anchor="middle" font-size="12" fill="#475569">按需唤醒 / 空闲休眠</text>
      <text x="1000" y="448" text-anchor="middle" font-size="12" fill="#475569">避免端口错绑</text>

      <rect x="360" y="550" width="780" height="150" rx="12" fill="#f8fafc" stroke="#94a3b8"/>
      <text x="750" y="578" text-anchor="middle" font-size="17" font-weight="700">数据与持久化</text>

      <rect x="390" y="600" width="230" height="72" rx="8" fill="#fff" stroke="#94a3b8"/>
      <text x="505" y="628" text-anchor="middle" font-size="13" font-weight="600">server/funfo.db</text>
      <text x="505" y="648" text-anchor="middle" font-size="12" fill="#475569">应用元数据 / 版本 / 消息 / slug</text>

      <rect x="640" y="600" width="230" height="72" rx="8" fill="#fff" stroke="#94a3b8"/>
      <text x="755" y="628" text-anchor="middle" font-size="13" font-weight="600">server/apps/&lt;appId&gt;/</text>
      <text x="755" y="648" text-anchor="middle" font-size="12" fill="#475569">server.js / schema.sql / data.sqlite</text>

      <rect x="890" y="600" width="220" height="72" rx="8" fill="#fff" stroke="#94a3b8"/>
      <text x="1000" y="628" text-anchor="middle" font-size="13" font-weight="600">Docker 网络</text>
      <text x="1000" y="648" text-anchor="middle" font-size="12" fill="#475569">主容器 ↔ 子容器内部通信</text>

      <line x1="300" y1="115" x2="360" y2="115" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="860" y1="126" x2="910" y2="110" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="725" y1="290" x2="725" y2="330" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="725" y1="510" x2="725" y2="550" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <line x1="180" y1="160" x2="180" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="190" y="202" font-size="12" fill="#475569">/app/&lt;slug&gt;/</text>

      <text x="78" y="722" font-size="12" fill="#64748b">注：0.61J 版本已启用 PM/UI 串行流程、QA Gate、Docker 子App隔离、/app/&lt;slug&gt; 路由。</text>
    </svg>

    <div class="card">
      <div class="legend">
        <div><span class="dot" style="background:#38bdf8"></span>用户入口层</div>
        <div><span class="dot" style="background:#22d3ee"></span>主服务容器层</div>
        <div><span class="dot" style="background:#4ade80"></span>子App运行层</div>
        <div><span class="dot" style="background:#94a3b8"></span>持久化与平台基础设施</div>
      </div>
    </div>
  </div>
</body>
</html>
